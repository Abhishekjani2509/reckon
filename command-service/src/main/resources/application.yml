spring:
  application:
    name: command-service

  datasource:
    # Defaults target the docker-compose Postgres; every value can be overridden by
    # environment variable, which is how this gets real credentials in a real
    # deployment. Nothing secret is ever committed.
    # Port 5433: the compose file maps Reckon's Postgres there to avoid a clash with
    # another PostgreSQL already on this machine's 5432.
    url: ${RECKON_DB_URL:jdbc:postgresql://localhost:5433/reckon}
    username: ${RECKON_DB_USER:reckon}
    password: ${RECKON_DB_PASSWORD:reckon}

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      # Java 21 virtual threads. This service's work is almost entirely waiting on
      # Postgres, and a platform thread parked on I/O is an expensive way to wait.
      # Virtual threads make blocking JDBC cheap to scale under concurrency without
      # rewriting the data access as async.
      enabled: true

  kafka:
    # 19092 is Redpanda's host-facing listener (the in-network one is redpanda:9092).
    bootstrap-servers: ${RECKON_KAFKA_BOOTSTRAP:localhost:19092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # acks=all + idempotence: the broker acknowledges only after replication, and the
      # producer tags records so a retried send is de-duplicated rather than doubled.
      # This makes the poller's own retries safe; it does not remove the republish that
      # follows a crash between send and mark-published, which is why the consumer must
      # still be idempotent.
      acks: all
      properties:
        enable.idempotence: true

reckon:
  outbox:
    topic: ${RECKON_OUTBOX_TOPIC:reckon.account.events}
    # Partitions for the account-events topic. Keyed by aggregate_id, so per-account
    # ordering holds while distinct accounts spread across partitions.
    partitions: 3
    # How often the poller drains, and how many rows it takes per pass. A short delay
    # keeps write-to-publish latency low; the batch caps how long any one pass runs.
    poll-delay-ms: 200
    batch-size: 200

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      # Show the component breakdown, so /actuator/health proves the *database*
      # is reachable rather than just reporting that the web server is up.
      show-details: always

server:
  port: 8080

logging:
  level:
    org.flywaydb: INFO
