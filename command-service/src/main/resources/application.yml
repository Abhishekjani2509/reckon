spring:
  application:
    name: command-service

  datasource:
    # Defaults target the docker-compose Postgres; every value can be overridden by
    # environment variable, which is how this gets real credentials in a real
    # deployment. Nothing secret is ever committed.
    # Port 5433: the compose file maps Reckon's Postgres there to avoid a clash with
    # another PostgreSQL already on this machine's 5432.
    url: ${RECKON_DB_URL:jdbc:postgresql://localhost:5433/reckon}
    username: ${RECKON_DB_USER:reckon}
    password: ${RECKON_DB_PASSWORD:reckon}

  flyway:
    enabled: true
    locations: classpath:db/migration

  threads:
    virtual:
      # Java 21 virtual threads. This service's work is almost entirely waiting on
      # Postgres, and a platform thread parked on I/O is an expensive way to wait.
      # Virtual threads make blocking JDBC cheap to scale under concurrency without
      # rewriting the data access as async.
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      # Show the component breakdown, so /actuator/health proves the *database*
      # is reachable rather than just reporting that the web server is up.
      show-details: always

server:
  port: 8080

logging:
  level:
    org.flywaydb: INFO
