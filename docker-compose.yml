## Reckon — local infrastructure.
##
## Three backing services, one command. Every container declares a healthcheck so
## that `docker compose up --wait` can tell "started" apart from "actually ready" —
## a Postgres container accepts TCP connections seconds before it will accept a
## query, and command-service must not boot into that gap.

services:
  # The event store. Source of truth: every state change in Reckon is a row here.
  postgres:
    image: postgres:16-alpine
    container_name: reckon-postgres
    environment:
      POSTGRES_DB: reckon
      POSTGRES_USER: reckon
      # Local development only. Real deployments inject credentials from a secret
      # manager -- see the RECKON_DB_* overrides in application.yml.
      POSTGRES_PASSWORD: reckon
    ports:
      # 5433 on the host because this machine already runs another PostgreSQL on the
      # conventional 5432. Inside the compose network the port is still 5432 — only
      # host-side clients (your IDE, DBeaver, psql) use 5433.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init scripts run once, when the data volume is first created. This one adds the
      # read-side database (reckon_read) so both CQRS databases exist after one up.
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # -d/-U scope the check to our DB and role: the bare command would pass
      # against the transient bootstrap server Postgres runs during init.
      test: ["CMD-SHELL", "pg_isready -U reckon -d reckon"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Kafka-compatible broker. Carries events from the outbox to the projectors.
  # Redpanda speaks the Kafka API without a JVM or ZooKeeper.
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: reckon-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned          # yield the CPU; we're sharing a laptop, not owning a box
      - --node-id=0
      - --check=false
      # Two listeners on purpose: clients inside the compose network reach the
      # broker as `redpanda:9092`, clients on the host reach it as `localhost:19092`.
      # Kafka clients connect once to discover the broker, then reconnect to the
      # address the broker advertises — so a single listener would hand host
      # clients an address only reachable from inside Docker.
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"   # Kafka API, from the host
      - "9644:9644"     # admin API, used by the healthcheck below
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Hot balance cache. Treated as a disposable projection, never a source of truth --
  # anything here can be rebuilt by replaying the event store.
  redis:
    image: redis:7-alpine
    container_name: reckon-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Day 10 — Observability. Prometheus scrapes the three Spring services (running on the
  # host) and Grafana renders the dashboards. Both are pure infrastructure: they hold no
  # source of truth and can be torn down and recreated without touching Reckon's data.
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: reckon-prometheus
    # host.docker.internal is how a container reaches a service on the host. Docker Desktop
    # provides it automatically; host-gateway makes it resolve on plain Linux Docker too,
    # so the same compose file works on a laptop and in CI.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9090/-/healthy | grep -q Healthy"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  grafana:
    image: grafana/grafana:11.2.0
    container_name: reckon-grafana
    environment:
      # Local development only: skip the login wall so the dashboard opens straight away.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    volumes:
      # Provisioning wires up the datasource and dashboard at boot; the dashboards folder
      # holds the JSON the provider loads.
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
  redpanda-data:
  redis-data:
  prometheus-data:
  grafana-data:
